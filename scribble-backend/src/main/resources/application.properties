spring.application.name= scribble-backend

server.port= 8000

# PostgreSQL (override via environment in real deployments)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scribble}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.sql.init.mode=always

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

#Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT secret — set APP_JWT_SECRET in production (min 256 bits for HS256)
app.jwt.secret=${APP_JWT_SECRET:dvsdgfdkbnjfdbuifdnbiufhdigrjwhtwjgwget34r32vsdgw43242}
app.jwt.expiration-ms=86400000

# Websocket
spring.websocket.path=/ws

#Logging
logging.level.com.scribble=DEBUG

spring.web.resources.static-locations=classpath:/static/