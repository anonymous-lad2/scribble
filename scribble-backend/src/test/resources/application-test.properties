# In-memory DB — no local PostgreSQL required for mvn test
spring.datasource.url=jdbc:h2:mem:scribble_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Avoid PostgreSQL-specific data.sql (ON CONFLICT etc.) on H2 — context test does not need seed words
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Redis host/port: port is overridden by EmbeddedRedisInitializer when embedded server starts
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6389

# HS256 test secret (must be long enough for jjwt)
app.jwt.secret=test-jwt-secret-at-least-256-bits-for-hs256-required-zero-one-two-three-four-five-six-seven-eight-nine-abcdef
